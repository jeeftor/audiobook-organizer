name: Beta Release
on:
  push:
    branches:
      - 'develop'
permissions:
  contents: read

jobs:
  # Build on each platform
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
          - os: macos-14  # ARM64 runner
            goos: darwin
          - os: windows-latest
            goos: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build web frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build with goreleaser (single platform, snapshot)
        run: |
          go run github.com/goreleaser/goreleaser/v2@latest build --single-target --snapshot --clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.goos }}
          path: dist/
          retention-days: 7

  # Create pre-release with all platform artifacts
  pre-release:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      # Download all platform artifacts
      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-linux
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-darwin
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-windows
          path: dist/

      - name: List dist contents
        run: ls -R dist/

      # Generate version for pre-release.
      # Beta tags are based on the latest stable vMAJOR.MINOR.PATCH tag;
      # existing prerelease tags are ignored to avoid nested beta suffixes.
      - name: Generate version info
        id: version
        run: sh scripts/beta-version.sh

      # Create archives manually (since we're not using goreleaser release)
      - name: Create archives
        run: |
          mkdir -p archives

          # CLI archives
          for dir in dist/cli_*/; do
            if [ -d "$dir" ]; then
              platform=$(basename "$dir" | sed 's/cli_//')
              cd "$dir"
              if [[ "$platform" == *"windows"* ]]; then
                zip "../../archives/audiobook-organizer_${platform}.zip" audiobook-organizer.exe
              else
                tar czf "../../archives/audiobook-organizer_${platform}.tar.gz" audiobook-organizer
              fi
              cd ../..
            fi
          done

          ls -lh archives/

      # Create or update pre-release
      - name: Create/Update Pre-Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.release_name }}
          body: |
            ## Beta Release from `${{ steps.version.outputs.branch }}`

            **⚠️ This is a pre-release build from a feature branch. Use at your own risk!**

            ### What's Changed
            - Built from commit: ${{ github.sha }}
            - Branch: `${{ github.ref_name }}`

            ### Installation

            Download `audiobook-organizer_<platform>.tar.gz` (or `.zip` on Windows) for your platform.
            This is a single binary with CLI, TUI, ABS, and local web UI modes:

            ```
            audiobook-organizer          # CLI mode
            audiobook-organizer tui      # interactive terminal UI
            audiobook-organizer web      # local browser web UI
            audiobook-organizer gui      # compatibility alias for web
            ```

            Extract and run directly.

            ### Available Binaries
            - Linux (amd64, arm64)
            - macOS (amd64, arm64)
            - Windows (amd64, arm64)

            ---

            [View Changes](https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.version }}...${{ github.sha }})
          files: archives/*
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # Keep only the 5 most recent pre-releases, delete older ones
      - name: Prune old beta releases (keep 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName,createdAt,isPrerelease --limit 100 \
            --jq '[.[] | select(.isPrerelease)] | sort_by(.createdAt) | .[:-5] | .[].tagName' \
          | xargs -r -I {} sh -c 'echo "Deleting old beta: {}" && gh release delete "{}" --yes --cleanup-tag'

      - name: Upload build artifacts (backup)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: beta-build-failed
          path: |
            dist/*
            archives/*
          retention-days: 7

      - name: Print Release Info
        run: |
          echo "Release Tag: ${{ steps.version.outputs.version }}"
          echo "Release Name: ${{ steps.version.outputs.release_name }}"
          echo "Branch: ${{ steps.version.outputs.branch }}"
