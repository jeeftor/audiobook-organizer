name: Test

on:
  pull_request:
    branches: [ "main", "master", "feature/**", "develop", "dev" ]
  push:
    branches: [ "main", "master", "feature/**", "develop", "dev" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Run tests
      run: |
        go mod tidy
        $(go env GOPATH)/bin/gotestsum --format=testname -- -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage.out
        flags: unittests
        fail_ci_if_error: true

    - name: Send coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.out

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: coverage.out

    - name: Display coverage summary
      run: |
        go tool cover -func=coverage.out

  abs-e2e:
    name: ABS metadata lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        cache: true
        cache-dependency-path: go.sum

    - name: Cache ABS public-domain fixtures
      uses: actions/cache@v4
      with:
        path: |
          test/abs/staging-data/audiobooks
          test/abs/staging-data/books
        key: ${{ runner.os }}-abs-fixtures-v1-${{ hashFiles('test/abs/scripts/seed-public-domain.sh') }}
        restore-keys: |
          ${{ runner.os }}-abs-fixtures-v1-

    - name: Show Docker version
      run: |
        docker version
        docker compose version

    - name: Install ABS test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Run ABS metadata lifecycle tests
      run: make abs-test-metadata

    - name: Stop ABS containers
      if: always()
      run: docker compose -f test/abs/docker-compose.yml down --remove-orphans

    - name: Upload ABS logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: abs-e2e-state
        path: |
          test/abs/state/**/metadata/logs/**
          test/abs/runtime/**/*.log
